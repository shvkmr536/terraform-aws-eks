apiVersion: apps/v1
kind: Deployment

metadata:
  name: eks-demo-app
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: eks-demo-app

  template:
    metadata:
      labels:
        app: eks-demo-app

    spec:
      containers:
        - name: eks-demo-app

          image: IMAGE_PLACEHOLDER

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "200m"