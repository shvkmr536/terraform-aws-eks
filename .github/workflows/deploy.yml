name: Deploy

on:
  push:
    branches:
      - main
    paths:
        - 'app/**'
        - 'Dockerfile'
        - 'kubernetes/**'
  workflow_run:
    workflows: ["Bootstrap EKS Platform"]
    types:
      - completed

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payment-dev
  #IMAGE_TAG: latest
  EKS_CLUSTER: payment-dev-eks-cluster

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        working-directory: app
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      # Update kubeconfig
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER

      #Replace Image Placeholder
      - name: Update Deployment Manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}|g" kubernetes/apps/deployment.yaml

      # Deploy to Kubernetes
      - name: Deploy to EKS
        run: |
          kubectl apply -f kubernetes/apps/
          kubectl apply -f kubernetes/ingress/
      
      # wait pods to be created
      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/eks-dev-deployment-app

      # Verify Rollout
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/eks-dev-deployment-app
          kubectl get pods
          kubectl get svc
          kubectl get ingress