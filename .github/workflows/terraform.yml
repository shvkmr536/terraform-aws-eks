name: Terraform provisioning

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
#env:
#  AWS_REGION: us-east-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'dev'}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "env=develop" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        working-directory: environments/${{ steps.env.outputs.env }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: environments/${{ steps.env.outputs.env }}
        run: terraform init

      - name: Terraform Validate
        working-directory: environments/${{ steps.env.outputs.env }}
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/${{ steps.env.outputs.env }}
        run: terraform plan -out=tfplan


      #- name: Upload Plan
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: terraform-plan
      #    path: terraform/environments/dev/tfplan

      #- name: Terraform apply
      #  if: github.ref == 'refs/heads/main'
